openapi: 3.1.0
info:
  title: Systematic Program Update API
  version: 1.1.0
  description: API to update a systematic withdrawal program on a policy.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: https://api.your-company-domain.com
    description: Production
  - url: https://sandbox.your-company-domain.com
    description: Sandbox
paths:
  /v1/policies/{policyNumber}/transactions/{transactionType}/{arrangementId}:
    put:
      operationId: updateSystematicProgram
      summary: Update a systematic withdrawal program
      tags:
        - Systematic Withdrawal
      parameters:
        - name: policyNumber
          in: path
          required: true
          description: Unique policy number
          schema:
            type: string
            pattern: '^[A-Za-z0-9]{6,20}$'
        - name: transactionType
          in: path
          required: true
          description: Type of transaction being processed
          schema:
            type: string
            enum: [update-systematic-program, update-rmd-program]
        - name: arrangementId
          in: path
          required: true
          description: arrangementId is the unique id for the systematic programs available in the policy.
          schema:
            type: string
        - name: CorrelationId
          in: header
          required: true
          description: Unique identifier to trace the request
          schema:
            type: string
            maxLength: 100
        - name: cusip
          in: query
          required: false
          description: Optional; REQUIRED only when policyNumber is not globally unique.
          schema:
            type: string
            pattern: '^[A-Za-z0-9]{5,9}$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystematicWithdrawalUpdateRequest'
            examples:
              Amount_Net_Update:
                summary: Amount-based, Net update
                value:
                  effectiveDate: '2025-01-20'
                  actionIndicator: 'O'
                  associatedFirmId: 'FIRM123'
                  nsccParticipantId: 'NSCC001'
                  cusip: '12345A'
                  SystematicWithdrawal:
                    paymentForm: 'ACH'
                    arrangementType: 'WITHDRAWAL'
                    amountType: 'AMOUNT'
                    netGrossIndicator: 'N'
                    requestedAmount: 300.00
                    frequency: 'MONTHLY'
                    startDate: '2025-02-01'
                    endDate: '2025-12-31'
                    payee:
                      partyId: 'Party_PI_1'
                      firstName: 'Alex'
                      lastName: 'Smith'
                      bank:
                        bankId: 'Bank_1'
                        startDate: '2024-12-01'
                        nameOnAccount: 'Alex Smith'
                        accountStatus: 'ACTIVEBANKACCOUNT'
                        accountType: 'CHECKING'
                        accountNumber: '12345678'
                        routingNumber: '123456789'
                        branchName: 'Main Branch'
                    parties:
                      - partyId: 'Party_PI_1'
                        partyRole: 'OWNER'
                        paymentForm: 'ACH'
                        allocationPercentage: 100
                    producer:
                      producerNumber: 'PROD001'
                      npn: '1234567890'
                      crdNumber: '9876543210'
                    fundAllocation:
                      allocationOption: 'PRORATA'
      responses:
        '200':
          description: Successful update
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystematicProgramUpdateResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '502':
          description: Bad Gateway
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '504':
          description: Gateway Timeout
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - oauth2: [withdrawal.write]
components:
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://auth.your-company-domain.com/oauth2/token
          scopes:
            withdrawal.write: Update systematic programs
            withdrawal.read: Read systematic programs
  schemas:
    PartyIdentity:
      type: object
      description: Common party identity fields
      properties:
        partyId:
          type: string
          maxLength: 100
        firstName:
          type: string
          maxLength: 100
        middleName:
          type: string
          maxLength: 100
        lastName:
          type: string
          maxLength: 100
        organizationName:
          type: string
          maxLength: 100
    Producer:
      type: object
      description: Information about the producer submitting the request
      properties:
        producerNumber:
          type: string
          maxLength: 100
        npn:
          type: string
          pattern: '^\d{1,10}$'
          maxLength: 100
        crdNumber:
          type: string
          pattern: '^\d{1,10}$'
          maxLength: 100
    SystematicWithdrawalUpdateRequest:
      type: object
      description: SystematicWithdrawalUpdateRequest
      properties:
        effectiveDate:
          type: string
          format: date
          pattern: '^([0-9]{4})-([0-9]{2})-([0-9]{2})$'
        associatedFirmId:
          type: string
          maxLength: 100
        nsccParticipantId:
          type: string
          maxLength: 100
        cusip:
          type: string
          description: Optional; REQUIRED only when policyNumber is not globally unique.
          pattern: '^[A-Za-z0-9]{5,9}$'
        actionIndicator:
          type: string
          enum: [N, O, C]
        SystematicWithdrawal:
          $ref: '#/components/schemas/SystematicWithdrawal'
      required:
        - effectiveDate
        - actionIndicator
    SystematicWithdrawal:
      type: object
      properties:
        paymentForm:
          type: string
          description: Mode of payment
          enum: [DTCC, CREDITCARD, ACH, CHECK, WIRE, EXCHANGE]
        arrangementType:
          type: string
          description: The type of payment such as fixed or flexible
          enum: [PAYMENT, WITHDRAWAL, LOANREPAYMENT, REQUIREDMINIMUMDISTRIBUTION, PAYOUT]
        amountType:
          type: string
          description: >-
            Amount Type selected by user. Following is dropdown list 1. Amount – If selected user should be able to enter Amount for Transaction Amount field 2. Percent – If selected user should be able to enter Percentage for Transaction Amount field 3. Max – If selected user should NOT be able to enter Amount. Auto calculated using Maximum Withdrawal Amount. 4. Free Withdrawal Amount – If selected user should NOT be able to enter Amount. Auto calcualted using Free Withdrawal Amount. 5. Withdraw Until Basis ---- If selected user should NOT be able to enter Amount. Auto calcualted using Cost Basis.
          enum: [AMOUNT, PERCENTAGE, MAX, FREEWITHDRAWALAMOUNT, WITHDRAWALUNTILBASIS, EARNINGSONLY, PRORATA]
        netGrossIndicator:
          type: string
          description: To indicate if the transsaction is "Net" or "Gross"
          enum: [N, G]
        requestedAmount:
          type: number
          format: double
          description: Requested amount value
          example: 5
        requestedPercentage:
          type: number
          format: double
          description: Requested Percentage value
          minimum: 0
          maximum: 100
        frequency:
          type: string
          description: frequency
          enum: [DAILY, EVERYTWOWEEKS, MONTHLY, SEMIANNUAL, QUARTERLY, ANNUAL, SINGLEPAYMENT]
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        previousProgramDate:
          type: string
          format: date
        nextProgramDate:
          type: string
          format: date
        payee:
          $ref: '#/components/schemas/Payee'
        parties:
          type: array
          items:
            $ref: '#/components/schemas/SystematicParty'
        producer:
          $ref: '#/components/schemas/Producer'
        fundAllocation:
          $ref: '#/components/schemas/FundAllocation'
        fundDistributions:
          type: array
          items:
            $ref: '#/components/schemas/FundDistribution'
        RMDInfo:
          $ref: '#/components/schemas/RMDInfo'
      required:
        - paymentForm
        - arrangementType
        - netGrossIndicator
      oneOf:
        - description: When amountType is AMOUNT, requestedAmount must be supplied.
          allOf:
            - properties:
                amountType:
                  enum: [AMOUNT]
            - required: [amountType, requestedAmount]
        - description: When amountType is PERCENTAGE, requestedPercentage must be supplied.
          allOf:
            - properties:
                amountType:
                  enum: [PERCENTAGE]
            - required: [amountType, requestedPercentage]
        - description: When amountType is MAX, FREEWITHDRAWALAMOUNT, or WITHDRAWALUNTILBASIS, requestedAmount and requestedPercentage must not be supplied.
          allOf:
            - properties:
                amountType:
                  enum: [MAX, FREEWITHDRAWALAMOUNT, WITHDRAWALUNTILBASIS]
            - required: [amountType]
            - not:
                anyOf:
                  - required: [requestedAmount]
                  - required: [requestedPercentage]
    Payee:
      type: object
      properties:
        partyId:
          type: string
          description: Impacted Party in the event of financial transaction
          example: Party_PI_1
        firstName:
          type: string
        middleName:
          type: string
        lastName:
          type: string
        organizationName:
          type: string
        bank:
          $ref: '#/components/schemas/Bank'
        taxWithholdingInstructions:
          type: array
          items:
            $ref: '#/components/schemas/TaxWithholdingInstruction'
    Bank:
      type: object
      properties:
        bankId:
          type: string
          description: Comes in Acord 103
          example: Bank_1
        startDate:
          type: string
          format: date
          pattern: '^([0-9]{4})-([0-9]{2})-([0-9]{2})$'
        nameOnAccount:
          type: string
          description: Name of the registered user
        accountStatus:
          type: string
          enum: [ACTIVEBANKACCOUNT, TERMINATEDBANKACCOUNT]
        accountType:
          type: string
          enum: [CHECKING, SAVINGS, CREDITCARDACCOUNT, DEBITCARDACCOUNT, BROKERAGEACCOUNT, CERTIFICATEOFDEPOSITACCOUNT]
        accountNumber:
          type: string
          pattern: '^\d{4,17}$'
        routingNumber:
          type: string
          pattern: '^\d{9}$'
        branchName:
          type: string
          description: branch name
    TaxWithholdingInstruction:
      type: object
      properties:
        partyId:
          type: string
          description: Impacted Party in the event of financial transaction
          example: Party_PI_1
        taxWithholdingType:
          type: string
          enum: [FEDERAL, STATE, NRA, BACKUP]
        taxRateToUse:
          type: string
          enum: [NOWITHHOLDINGELECTED, USEVALUESENTERED, NOWITHHOLDINGALLOWED, USEDEFAULTTABLE]
        filingStatus:
          type: string
          enum: [SINGLE, DOMESTICPARTNERSHIP, DEFAULT, MARRIED, HEADOFHOUSEHOLD, WIDOWED, DIVORCED]
        dollar:
          type: number
          format: double
          example: 10
        percentage:
          type: number
          format: double
          minimum: 0
          maximum: 100
          example: 50
        exemptions:
          type: integer
          format: int32
        taxJurisdiction:
          type: string
          example: USA
      required:
        - partyId
        - taxWithholdingType
        - taxRateToUse
    SystematicParty:
      allOf:
        - $ref: '#/components/schemas/PartyIdentity'
        - type: object
          properties:
            partyRole:
              type: string
              description: Party Role
              enum: [OWNER, PRIMARYBENEFICIARY, CONTINGENTBENEFICIARY, INSURED, PAYOR, PAYEE, AGENT, THIRDPARTYDESIGNEE]
            paymentForm:
              type: string
              enum: [DTCC, CREDITCARD, ACH, CHECK, WIRE, EXCHANGE]
            allocationPercentage:
              type: number
              format: double
              description: At Policy Level for Each Applicable Fund
              example: 100
            bank:
              $ref: '#/components/schemas/Bank'
            address:
              $ref: '#/components/schemas/Address'
            forBenefitOfOrForFurtherCredit:
              type: string
              description: FBO - For Benefit Of, FFC - For Further Credit.
              example: TBD
          required:
            - partyId
            - paymentForm
            - allocationPercentage
    Address:
      type: object
      properties:
        addressId:
          type: string
          description: Address ID
          example: '1'
        addressType:
          type: string
          enum: [RESIDENCE, BUSINESS, POBOXSEASONAL, OTHER]
        addressLine1:
          type: string
          maxLength: 100
        addressLine2:
          type: string
          maxLength: 100
        addressLine3:
          type: string
          maxLength: 100
        city:
          type: string
          maxLength: 100
        state:
          type: string
          pattern: '^[A-Z]{2}$'
        zipCode:
          type: string
          pattern: '^[0-9A-Za-z -]{3,10}$'
        zipCodeExtension:
          type: string
          pattern: '^[0-9A-Za-z]{0,4}$'
    SystematicProgramUpdateResponse:
      type: object
      properties:
        message:
          type: string
        correlationId:
          type: string
        caseStatus:
          type: string
      required:
        - message
        - correlationId
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        correlationId:
          type: string
      required:
        - code
        - message
    FundAllocation:
      type: object
      description: Process of assigning available funds
      properties:
        allocationOption:
          type: string
          description: Defines the format of how the funds are removed
          enum: [PRORATA, DOLLAR, SPECIFYPERCENTAGE, SPECIFIEDFUNDS, SPECIFIEDSEGMENTS, DEFAULT, PECKINGORDER, EARNINGSONLY]
      required:
        - allocationOption
    FundDistribution:
      type: object
      description: Detailed allocation of funds
      properties:
        fundId:
          type: string
          maxLength: 100
          description: Fund identifier
        fundName:
          type: string
          maxLength: 100
          description: Name of the fund
        totalFundValue:
          type: number
          description: Total value of the fund
          minimum: 0
          maximum: 9999999999.99
        requestedAmount:
          type: number
          description: Requested amount from the fund
          minimum: 0
          maximum: 9999999999.99
        fundDistributionSegment:
          $ref: '#/components/schemas/FundDistributionSegment'
    FundDistributionSegment:
      type: object
      description: Fund distribution segmented details
      properties:
        segmentId:
          type: string
          maxLength: 100
          description: Segment identifier
        currentAmount:
          type: number
          description: Current amount in the segment
          minimum: 0
          maximum: 9999999999.99
        requestedAmount:
          type: number
          description: Requested amount from the segment
          minimum: 0
          maximum: 9999999999.99
    RMDInfo:
      type: object
      description: Required Minimum Distribution (RMD) details for the systematic program
      properties:
        RMDTaxYear:
          type: integer
          description: The tax year this RMD withdrawal is for (e.g., 2025).
        RMDAgeAtDistribution:
          type: integer
          description: The age of the RMD owner on the distribution date, in whole years.
        RMDSpouseDoB:
          type: string
          format: date
          description: Date of birth of the spouse used for RMD calculations, if applicable.
        RMDPartyRoleAge:
          type: string
          description: Which party’s age is used for the RMD calculation.
        RMDAnnualRequiredAmount:
          type: number
          format: double
          description: Total RMD amount required for the contract for the given RMDTaxYear.
        RMDAlreadySatisfiedAmount:
          type: number
          format: double
          description: Amount of RMD already taken year-to-date for the same RMDTaxYear.
        RMDRequestedAmount:
          type: number
          format: double
          description: Portion of this withdrawal that should count toward RMD for RMDTaxYear.
        RMDCalculationMethod:
          type: string
          description: The method or IRS table used to calculate the RMD.
        RMDLifeExpectancyFactor:
          type: number
          format: double
          description: The life expectancy factor used in the RMD formula for this tax year (e.g., 24.7).
        RMDPriorYearEndBalance:
          type: number
          format: double
          description: Contract value as of 12/31 of the prior year used as the base for RMD calculation.
      required:
        - RMDTaxYear
        - RMDAnnualRequiredAmount
        - RMDRequestedAmount
        - RMDCalculationMethod